name: ChatOps Deployment

on:
  issue_comment:
    types: [created]

jobs:
  deploy:
    name: Deploy to Environment
    # Ensure this only runs on Pull Request comments starting with ".deploy to"
    if: ${{ github.event.issue.pull_request && startsWith(github.event.comment.body, '.deploy to') }}
    runs-on: ubuntu-latest

    steps:
      # 1. Acknowledge with a 🚀 reaction
      - name: Acknowledge Command
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket'
            });

      # 2. Extract the environment name (e.g., "staging" or "production")
      - name: Parse Environment
        id: command
        run: |
          COMMENT="${{ github.event.comment.body }}"
          ENV_NAME=$(echo "$COMMENT" | awk '{print $3}')
          echo "env=$ENV_NAME" >> $GITHUB_OUTPUT

      # 3. Checkout the code from the Pull Request specifically
      - name: Checkout PR Code
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.issue.number }}/head

      # 4. Setup Environment
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      # 5. Production/Staging Deploy to Vercel
      # This uses the Vercel CLI to push the build to the cloud
      - name: Deploy to Vercel (${{ steps.command.outputs.env }})
        id: vercel_deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          # Install Vercel CLI locally
          npm install --global vercel
          
          # Pull environment settings and deploy
          # If the user says ".deploy to production", we use --prod flag
          if [ "${{ steps.command.outputs.env }}" = "production" ]; then
            vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} > deployment_url.txt
          else
            vercel deploy --token=${{ secrets.VERCEL_TOKEN }} > deployment_url.txt
          fi
          
          echo "url=$(cat deployment_url.txt)" >> $GITHUB_OUTPUT

      # 6. Report the result back to the PR
      - name: Comment Success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ **Deployment Successful!**\n\nEnvironment: `${{ steps.command.outputs.env }}`\nURL: ${{ steps.vercel_deploy.outputs.url }}\n\nFriday4:30 is now live for testing.'
            })

      # 7. Report failure if something goes wrong
      - name: Comment Failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ **Deployment Failed.**\n\nPlease check the [GitHub Actions logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.'
            })